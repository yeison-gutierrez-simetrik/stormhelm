# Acceptance gate in CI (§60): @release scenarios run BEFORE merge, on every PR.
#
# Installed by /setup into .github/workflows/acceptance.yml. This default is
# TypeScript + pnpm; for Python swap the setup/test steps (uv + pytest/behave —
# /setup tailors it to the active capability stack).
#
# ── CONSUMER PREREQUISITES (FOLLOW-UP 44 — all three broke the first live
# ── adoption; /setup adds the two package.json entries when missing):
#   1. package.json MUST carry a `packageManager` field (e.g.
#      "packageManager": "pnpm@9.15.0") — pnpm/action-setup@v4 hard-fails
#      without it ("No pnpm version is specified").
#   2. package.json MUST define a `test:acceptance` script that OWNS the tag
#      scoping, e.g. "test:acceptance": "cucumber-js --tags @release".
#   3. This workflow invokes the script PLAINLY (`pnpm test:acceptance`) —
#      never `pnpm script -- --tags x`: npm strips the `--`, but pnpm passes
#      it through LITERALLY and cucumber reads it as a feature path
#      (ENOENT: open '…/@release'). The script owning the tags works under
#      both package managers.
#
# §60's three promises, each mapped to an artifact (FOLLOW-UP 42):
#   @smoke on every push      → the pre-push hook /setup installs
#   @release in CI pre-merge  → THIS workflow (via the test:acceptance script,
#                               which carries the `--tags @release` scoping)
#   untagged scenarios fail   → the BDD runner's strict mode in this job
#
# External-sandbox specs (Stripe sandbox, etc.) are gated by SECRET PRESENCE:
# without repo secrets they must self-skip with a visible note, so this
# workflow is green out-of-the-box and consumers opt into sandbox CI by adding
# the secrets. testcontainers (§31 test-real) work natively on ubuntu-latest —
# the docker daemon is present.
name: acceptance

on:
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: "@release acceptance (§60)"
        env:
          # Sandbox secrets — absent on a fresh adoption: dependent specs must
          # self-skip visibly (never fail, never silently pass).
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        # Plain invocation — the test:acceptance script owns `--tags @release`
        # (prerequisites 2/3 above; `-- --tags` breaks under pnpm).
        run: pnpm test:acceptance
